---
site_name: algebra_worksheets
site_url: https://algebra_worksheets.readthedocs.io/
site_author: Matthew Martin <matthewdeanmartin@gmail.com>
site_description: Generate printable algebra worksheets with answer keys.
repo_url: https://github.com/matthewdeanmartin/algebra_worksheets
theme:
  name: readthedocs
  features: [navigation.footer]
edit_uri: edit/main/docs/
markdown_extensions:
  - attr_list
  - codehilite
  - toc:
      permalink: true
nav:
  - Overview:
      - Readme.md: overview/README.md
  - Installation: installation.md
  - Usage:
      - Quick Start: usage/quickstart.md
  - Contributing: extending/CONTRIBUTING.md
  - Change Log: CHANGELOG.md
validation:
  nav:
    omitted_files: warn
  omitted_files: warn
  absolute_links: warn
  unrecognized_links: warn
  anchors: warn
plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
